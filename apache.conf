<Directory /var/www/html>
    AllowOverride All
    Require all granted
</Directory>

# Send Apache + PHP logs to the container's stderr so they show up in
# `docker compose logs`. Without this they go to files under /var/log/apache2,
# which is a tmpfs mount here — wiped on restart and never seen by Docker.
# This overrides the main-server ErrorLog; the per-vhost one is redirected in
# the Dockerfile (sites-available/000-default.conf).
ErrorLog /dev/stderr

# Defense in depth: never serve source, schema, secrets, or scripts even if
# they end up in the web root. The .dockerignore keeps most of these out of the
# image; this blocks the rest at the HTTP layer.
<FilesMatch "\.(sql|md|env|sh|conf|example|ini|lock|json|yml|yaml)$">
    Require all denied
</FilesMatch>
<FilesMatch "^\.">
    Require all denied
</FilesMatch>

