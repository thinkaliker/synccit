services:
  synccit:
    image: ${SYNCCIT_IMAGE:-ghcr.io/drakeapps/synccit:latest}
    # Container now runs Apache as the unprivileged www-data user on port 8080.
    ports:
      - "${APP_PORT:-8080}:8080"
    container_name: synccit
    # ── Runtime hardening ───────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    # read_only makes the root FS immutable, so every path Apache/PHP needs to
    # write to is mounted as tmpfs (mode 1777 so the non-root www-data user can
    # write). Apache pid/lock/logs and the PHP session dir live here.
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs: { mode: 01777 }
      - type: tmpfs
        target: /var/run/apache2
        tmpfs: { mode: 01777 }
      - type: tmpfs
        target: /var/lock/apache2
        tmpfs: { mode: 01777 }
      - type: tmpfs
        target: /var/log/apache2
        tmpfs: { mode: 01777 }
      - type: tmpfs
        target: /var/lib/php/sessions
        tmpfs: { mode: 01777 }
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 8080) ? 0 : 1);"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      # Database — defaults to the bundled 'db' service.
      # For an external DB, override DB_HOST (and other DB_* vars) via .env
      # and run without --profile internal-db.
      DB_HOST: ${DB_HOST:-synccit_db}
      DB_USER: ${DB_USER:-synccit}
      DB_PASS: ${DB_PASS:-synccit}
      DB_NAME: ${DB_NAME:-rddtsync}
      BASE_HOST: ${BASE_HOST:-http://localhost:8080}
      BASE_URL: ${BASE_URL:-}
      API_LOC: ${API_LOC:-}
      PRETTY_URLS: ${PRETTY_URLS:-true}
      # SMTP — leave blank to disable email features
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_ENC: ${SMTP_ENC:-ssl}
      SMTP_PORT: ${SMTP_PORT:-465}
      FROM_EMAIL: ${FROM_EMAIL:-}
      # Set to true to also run api/apps.sql on first start
      INIT_APPS_DB: ${INIT_APPS_DB:-false}
      # Set to true to disable new user registration
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
    depends_on:
      synccit_db:
        condition: service_healthy
        required: false

  # ── Internal database (bundled) ─────────────────────────────────────────────
  # Start with:  docker compose --profile internal-db up
  # Skip for external DB: docker compose up  (set DB_HOST etc. in .env)
  synccit_db:
    # For immutability pin by digest:
    #   docker buildx imagetools inspect mysql:8.0 --format '{{.Manifest.Digest}}'
    #   then: image: mysql:8.0@sha256:<digest>
    image: mysql:8.0
    profiles:
      - internal-db
    command: --skip-ssl
    environment:
      MYSQL_DATABASE: ${DB_NAME:-rddtsync}
      MYSQL_USER: ${DB_USER:-synccit}
      MYSQL_PASSWORD: ${DB_PASS:-synccit}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
    container_name: synccit_db
    volumes:
      - synccit_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  synccit_db_data:
